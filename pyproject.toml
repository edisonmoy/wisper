[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# NSApplication activation-policy must be set before importing rumps/AppKit;
# the local imports that follow are intentionally below that call.
"app.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = [
    "config", "history", "hotkey", "overlay",
    "recorder", "transcriber", "updater",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "benchmark: performance benchmarks (use pytest-benchmark for detailed stats)",
]

[tool.coverage.run]
branch = true
concurrency = ["thread"]
source = ["."]
omit = [
    "tests/*",
    "*/site-packages/*",
    "make_icon.py",
    ".venv/*",
]

[tool.coverage.report]
fail_under = 100
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "def run\\(self\\):",           # rumps mock run() stub
]
